<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julie Chasen</title>
<meta name="description" content="Julie Chasen — AI, marketing, and design for businesses ready to grow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    background: #111;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-image: url('images/cre-multifamily.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0, 0, 0, 0.45) 0%,
        rgba(0, 0, 0, 0.15) 35%,
        rgba(0, 0, 0, 0.25) 70%,
        rgba(0, 0, 0, 0.55) 100%);
  }

  nav {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 36px 64px;
    z-index: 10;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 1.6rem;
    letter-spacing: 0.28em;
    color: #fff;
    text-transform: uppercase;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 44px; align-items: center; }
  .nav-links a {
    color: #fff;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: opacity 0.2s ease;
  }
  .nav-links a:hover { opacity: 0.65; }

  .overlay {
    position: absolute;
    left: 8vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    max-width: 720px;
  }
  .overlay h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 7.5vw, 6.5rem);
    line-height: 1.02;
    color: #fff;
    letter-spacing: 0.005em;
  }
  .overlay h1 em {
    font-style: italic;
    font-weight: 400;
  }

  .footer-note {
    position: absolute;
    bottom: 36px;
    left: 64px;
    right: 64px;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.75);
  }
  .footer-note a {
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    padding-bottom: 2px;
    transition: opacity 0.2s ease;
  }
  .footer-note a:hover { opacity: 0.7; }

  @media (max-width: 720px) {
    nav { padding: 22px 24px; }
    .brand { font-size: 1.1rem; letter-spacing: 0.22em; }
    .nav-links { gap: 24px; }
    .nav-links a { font-size: 0.85rem; }
    .overlay { left: 24px; right: 24px; top: 46%; }
    .overlay h1 { font-size: clamp(2.4rem, 11vw, 4rem); }
    .footer-note {
      bottom: 24px; left: 24px; right: 24px;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      font-size: 0.7rem;
    }
  }
</style>
</head>
<body>
  <div class="hero">
    <nav>
      <a href="/" class="brand">Julie Chasen</a>
      <div class="nav-links">
        <a href="/resume">CV</a>
        <a href="mailto:juliechasen@gmail.com">Contact</a>
      </div>
    </nav>

    <div class="overlay">
      <h1>AI, marketing,<br>and <em>design.</em></h1>
    </div>

    <div class="footer-note">
      <span>New portfolio coming soon</span>
      <a href="mailto:juliechasen@gmail.com">juliechasen@gmail.com</a>
    </div>
  </div>
</body>
</html>
